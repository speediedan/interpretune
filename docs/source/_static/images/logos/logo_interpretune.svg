<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 96" width="560" height="96" role="img" aria-label="Interpretune">
  <defs>
    <linearGradient id="wmMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4f1"/>
      <stop offset="40%" stop-color="#aebbb5"/>
      <stop offset="65%" stop-color="#84988f"/>
      <stop offset="100%" stop-color="#cfd9d5"/>
    </linearGradient>
    <linearGradient id="wmGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2eaf6c"/>
      <stop offset="100%" stop-color="#135f3c"/>
    </linearGradient>
  </defs>
  <!-- "Interpret" -->
  <text x="8" y="66" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56"
        font-weight="650" letter-spacing="0.5" fill="url(#wmGreen)">Interpret</text>
  <!-- metallic tuning fork standing in for the 'u' (x-height U with a short handle) -->
  <g transform="translate(252,0)" stroke="url(#wmMetal)" stroke-width="7.5" stroke-linecap="round" fill="none">
    <path d="M8 30 V52 a12 12 0 0 0 24 0 V30"/>
    <path d="M20 66 V80"/>
    <path d="M8 31 V51" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2"/>
  </g>
  <!-- "ne" -->
  <text x="296" y="66" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56"
        font-weight="650" letter-spacing="0.5" fill="url(#wmGreen)">ne</text>
</svg>
