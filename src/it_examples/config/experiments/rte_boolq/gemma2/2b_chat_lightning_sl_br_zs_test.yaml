session_cfg:
  adapter_ctx: [lightning, sae_lens]
  datamodule_cls: it_examples.experiments.rte_boolq.RTEBoolqDataModule
  module_cls: it_examples.experiments.rte_boolq.RTEBoolqModule
  datamodule_cfg:
    class_path: interpretune.config.datamodule.ITDataModuleConfig
    init_args:
      model_name_or_path: google/gemma-2-2b-it
      task_name: rte
      train_batch_size: 2
      eval_batch_size: 2
      cust_tokenization_pattern: gemma-chat
      os_env_model_auth_key: HF_GATED_PUBLIC_REPO_AUTH_KEY
      enable_datasets_cache: true
      prepare_data_map_cfg:
        batched: true
      data_collator_cfg:
        collator_class: transformers.DataCollatorWithPadding
      prompt_cfg:
        class_path: it_examples.example_prompt_configs.RTEBoolqGemma2PromptConfig
      tokenizers_parallelism: false
      signature_columns: ['input', 'attention_mask', 'labels']
      tokenizer_kwargs:
        padding_side: left
        add_bos_token: true
        local_files_only: false
        model_input_names:
        - input
        - attention_mask
  module_cfg:
    class_path: it_examples.experiments.rte_boolq.RTEBoolqSLConfig
    init_args:
      experiment_tag: gemma2_2b_chat_lightning_sl_br_zs_test
      use_bridge: true
      model_cfg:
        _attn_implementation: eager
      tl_cfg:
        class_path: interpretune.config.transformer_lens.ITLensBridgeConfig
        init_args:
          model_name: gemma-2-2b-it
          device: cuda
          dtype: bfloat16
          default_padding_side: left
          enable_compatibility_mode: true
          enable_compatibility_mode_kwargs:
            fold_ln: true
            fold_value_biases: true
      sae_cfgs:
        class_path: interpretune.config.sae_lens.SAELensFromPretrainedConfig
        init_args:
          release: gemma-scope-2b-pt-res-canonical
          sae_id: layer_25/width_16k/canonical
          device: cuda
          dtype: torch.bfloat16
      generative_step_cfg:
        class_path: it_examples.experiments.rte_boolq.RTEBoolqGenerativeClassificationConfig
        init_args:
          enabled: true
          lm_generation_cfg:
            class_path: interpretune.config.transformer_lens.TLensGenerationConfig
            init_args:
              padding_side: left
              stop_at_eos: true
              use_past_kv_cache: false
              max_new_tokens: 5
              output_logits: true
      hf_from_pretrained_cfg:
        class_path: interpretune.config.module.HFFromPretrainedConfig
        init_args:
          use_model_cache: false
          model_head: transformers.Gemma2ForCausalLM
          activation_checkpointing: false
          pretrained_kwargs:
            device_map: 0
            dtype: bfloat16
trainer:
  accumulate_grad_batches: 1
  precision: bf16-true
  devices: 1
  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      name: gemma2_2b_chat_lightning_sl_br_zs_test
      save_dir: lightning_logs
