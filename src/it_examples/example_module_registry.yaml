gpt2.rte_demo.sae_lens:
  reg_info:
    model_src_key: gpt2
    model_cfg_key: rte_demo
    adapter_combinations:
      - [core, sae_lens]
      - [lightning, sae_lens]
    description: TransformerBridge SAE Lens example, GPT2 with supported adapter compositions
  shared_config:
    task_name: rte
    model_name_or_path: gpt2
    tokenizer_id_overrides:
      pad_token_id: 50256
    tokenizer_kwargs:
      # TransformerBridge passes tokens directly to the underlying HF model, so
      # attention_mask must be in model_input_names for proper left-padding masking.
      model_input_names: ['input', 'attention_mask']
      padding_side: left
      add_bos_token: true
  registered_cfg:
    datamodule_cfg:
      prompt_cfg:
        class_path: it_examples.experiments.rte_boolq.RTEBoolqPromptConfig
      # attention_mask must be in signature_columns so _remove_unused_columns preserves it.
      signature_columns: ['input', 'attention_mask', 'labels']
      text_fields: ["premise", "hypothesis"]
      enable_datasets_cache: True
      train_batch_size: 2
      eval_batch_size: 2
    module_cfg:
      class_path: interpretune.config.module.ITConfig
      init_args:
        auto_comp_cfg:
          class_path: interpretune.config.shared.AutoCompConfig
          init_args:
            module_cfg_name: RTEBoolqConfig
            module_cfg_mixin:
              class_path: it_examples.experiments.rte_boolq.RTEBoolqEntailmentMapping
              import_only: True
        generative_step_cfg:
          class_path: it_examples.experiments.rte_boolq.RTEBoolqGenerativeClassificationConfig
          init_args:
            enabled: True
            lm_generation_cfg:
              class_path: interpretune.config.transformer_lens.TLensGenerationConfig
              init_args:
                max_new_tokens: 1
        hf_from_pretrained_cfg:
          class_path: interpretune.config.mixins.HFFromPretrainedConfig
          init_args:
            pretrained_kwargs:
              device_map: cpu
              dtype: float32
            model_head: transformers.GPT2LMHeadModel
        tl_cfg:
          class_path: interpretune.config.transformer_lens.ITLensBridgeConfig
          init_args:
            model_name: gpt2-small
            default_padding_side: left
        sae_cfgs:
          - class_path: interpretune.config.sae_lens.SAELensFromPretrainedConfig
            init_args:
              release: gpt2-small-res-jb
              sae_id: blocks.0.hook_resid_pre
              device: cuda
          - class_path: interpretune.config.sae_lens.SAELensFromPretrainedConfig
            init_args:
              release: gpt2-small-res-jb
              sae_id: blocks.1.hook_resid_pre
              device: cuda
    datamodule_cls:
      class_path: it_examples.experiments.rte_boolq.RTEBoolqDataModule
    module_cls:
      class_path: it_examples.experiments.rte_boolq.RTEBoolqModule
