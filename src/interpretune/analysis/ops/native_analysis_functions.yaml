---
# TODO: we need to more elegantly account for global wrap_summary behavior. For example, any
# batch with an `input` could also serialize `tokens` and `prompts` columns if configured to do so which we
# explicitly define currently but should be introspected during compilation.
labels_to_ids:
  description: Convert label strings to tensor IDs
  implementation: interpretune.analysis.ops.definitions.labels_to_ids_impl
  aliases: []
  output_schema:
    label_ids:
      datasets_dtype: int64
    orig_labels:
      datasets_dtype: int64
  input_schema:
    labels:
      datasets_dtype: string
      connected_obj: datamodule

get_answer_indices:
  description: Extract answer indices from batch
  implementation: interpretune.analysis.ops.definitions.get_answer_indices_impl
  aliases: []
  input_schema:
    input:
      datasets_dtype: int64
      connected_obj: datamodule
    answer_indices:
      datasets_dtype: int64
      required: false
  output_schema:
    answer_indices:
      datasets_dtype: int64

get_alive_latents:
  description: Extract alive latents from cache
  implementation: interpretune.analysis.ops.definitions.get_alive_latents_impl
  required_ops: [get_answer_indices]
  aliases: []
  input_schema:
    cache:
      required: false
      datasets_dtype: object
      non_tensor: true
      intermediate_only: true
    answer_indices:
      required: false
      datasets_dtype: int64
  output_schema:
    alive_latents:
      required: false
      datasets_dtype: int64
      per_latent_model_hook: true
      non_tensor: true

model_fwd:
  description: Basic model forward pass
  implementation: interpretune.analysis.ops.definitions.model_fwd_impl
  required_ops: [get_answer_indices]
  aliases: ['model_forward']
  input_schema:
    input:
      datasets_dtype: int64
      connected_obj: datamodule
    answer_indices:
      required: false
      datasets_dtype: int64
  output_schema:
    answer_logits:
      datasets_dtype: float32
      sequence_type: false
      dyn_dim: 1
      dyn_dim_ceil: max_seq_len
      array_shape: [null, batch_size, vocab_size]
    prompts:
      datasets_dtype: string
      required: false
      non_tensor: true

model_fwd_w_cache:
  description: Model forward pass with activation caching (no latent model hooks)
  implementation: interpretune.analysis.ops.definitions.model_fwd_w_cache_impl
  required_ops: [get_answer_indices]
  aliases: []
  input_schema:
    input:
      datasets_dtype: int64
      connected_obj: datamodule
  output_schema:
    answer_logits:
      datasets_dtype: float32
      sequence_type: false
      dyn_dim: 1
      dyn_dim_ceil: max_seq_len
      array_shape: [null, batch_size, vocab_size]
    cache:
      datasets_dtype: object
      non_tensor: true
      intermediate_only: true
    prompts:
      datasets_dtype: string
      required: false
      non_tensor: true

model_fwd_w_cache_latent_models:
  description: Model forward pass with activation caching and latent model (SAE) hooks
  implementation: interpretune.analysis.ops.definitions.model_fwd_w_cache_latent_models_impl
  required_ops: [get_answer_indices, get_alive_latents]
  aliases: []
  input_schema:
    input:
      datasets_dtype: int64
      connected_obj: datamodule
  output_schema:
    answer_logits:
      datasets_dtype: float32
      sequence_type: false
      dyn_dim: 1
      dyn_dim_ceil: max_seq_len
      array_shape: [null, batch_size, vocab_size]
    cache:
      datasets_dtype: object
      non_tensor: true
      intermediate_only: true
    prompts:
      datasets_dtype: string
      required: false
      non_tensor: true

model_ablation:
  description: Model ablation analysis
  implementation: interpretune.analysis.ops.definitions.model_ablation_impl
  importable_params:
    ablate_latent_fn: interpretune.analysis.ops.definitions.ablate_sae_latent
  required_ops: [get_answer_indices, get_alive_latents]
  aliases: []
  input_schema:
    input:
      datasets_dtype: int64
      connected_obj: datamodule
    alive_latents:
      datasets_dtype: int64
      per_latent_model_hook: true
      non_tensor: true
    answer_indices:
      datasets_dtype: int64
      required: false
  output_schema:
    answer_logits:
      datasets_dtype: float32
      per_latent: true
      sequence_type: false
      array_shape: [batch_size, vocab_size]

model_gradient:
  description: Model gradient-based attribution
  implementation: interpretune.analysis.ops.definitions.model_gradient_impl
  importable_params:
    logit_diff_fn: interpretune.analysis.ops.definitions.boolean_logits_to_avg_logit_diff
    get_loss_preds_diffs: interpretune.analysis.ops.definitions.get_loss_preds_diffs
  required_ops: [get_answer_indices]
  aliases: []
  input_schema:
    input:
      datasets_dtype: int64
      connected_obj: datamodule
    label_ids:
      datasets_dtype: int64
    orig_labels:
      datasets_dtype: int64
  output_schema:
    answer_logits:
      datasets_dtype: float32
      sequence_type: false
      array_shape: [batch_size, max_answer_tokens, num_classes]
    answer_indices:
      datasets_dtype: int64
    loss:
      datasets_dtype: float32
      sequence_type: false
    logit_diffs:
      datasets_dtype: float32
    preds:
      datasets_dtype: int64
    grad_cache:
      datasets_dtype: object
      non_tensor: true
      intermediate_only: true
    prompts:
      datasets_dtype: string
      required: false
      non_tensor: true

logit_diffs:
  description: Clean forward pass for computing logit differences
  implementation: interpretune.analysis.ops.definitions.logit_diffs_impl
  importable_params:
    logit_diff_fn: interpretune.analysis.ops.definitions.boolean_logits_to_avg_logit_diff
    get_loss_preds_diffs: interpretune.analysis.ops.definitions.get_loss_preds_diffs
  aliases: []
  # TODO: remove appropriate output_schema input_schema columns if/when get_loss_preds_diffs is made an op
  input_schema:
    input:
      datasets_dtype: float32
      connected_obj: datamodule
    label_ids:
      datasets_dtype: int64
    orig_labels:
      datasets_dtype: int64
    answer_logits:
      datasets_dtype: float32
      sequence_type: false
      dyn_dim: 1
      dyn_dim_ceil: max_seq_len
      array_shape: [null, batch_size, vocab_size]
    answer_indices:
      datasets_dtype: int64
  output_schema:
    loss:
      datasets_dtype: float32
      sequence_type: false
    logit_diffs:
      datasets_dtype: float32
    preds:
      datasets_dtype: int64
    answer_logits:
      datasets_dtype: float32
      sequence_type: false
      array_shape: [batch_size, max_answer_tokens, num_classes]

logit_diffs_cache:
  description: Clean forward pass for computing logit differences including cache activations (composition only)
  implementation: interpretune.analysis.ops.definitions.logit_diffs_impl
  importable_params:
    logit_diff_fn: interpretune.analysis.ops.definitions.boolean_logits_to_avg_logit_diff
    get_loss_preds_diffs: interpretune.analysis.ops.definitions.get_loss_preds_diffs
  aliases: []
  # TODO: remove appropriate output_schema input_schema columns if/when get_loss_preds_diffs is made an op
  input_schema:
    input:
      datasets_dtype: float32
      connected_obj: datamodule
    answer_logits:
      datasets_dtype: float32
      sequence_type: false
      dyn_dim: 1
      dyn_dim_ceil: max_seq_len
      array_shape: [null, batch_size, vocab_size]
    answer_indices:
      datasets_dtype: int64
    label_ids:
      datasets_dtype: int64
    orig_labels:
      datasets_dtype: int64
    cache:
      datasets_dtype: object
      non_tensor: true
      intermediate_only: true
  output_schema:
    loss:
      datasets_dtype: float32
      sequence_type: false
    logit_diffs:
      datasets_dtype: float32
    preds:
      datasets_dtype: int64
    answer_logits:
      datasets_dtype: float32
      sequence_type: false
      array_shape: [batch_size, max_answer_tokens, num_classes]

sae_correct_acts:
  description: Compute correct activations from SAE cache
  implementation: interpretune.analysis.ops.definitions.sae_correct_acts_impl
  required_ops: [get_alive_latents]
  aliases: []
  input_schema:
    logit_diffs:
      datasets_dtype: float32
    answer_indices:
      datasets_dtype: int64
    cache:
      datasets_dtype: object
      non_tensor: true
      intermediate_only: true
  output_schema:
    correct_activations:
      datasets_dtype: float32
      per_latent_model_hook: true

gradient_attribution:
  description: Compute attribution values from gradients
  implementation: interpretune.analysis.ops.definitions.gradient_attribution_impl
  required_ops: [get_alive_latents]
  aliases: []
  input_schema:
    input:
      datasets_dtype: float32
      connected_obj: datamodule
    answer_indices:
      datasets_dtype: int64
    logit_diffs:
      datasets_dtype: float32
    grad_cache:
      datasets_dtype: object
      non_tensor: true
      intermediate_only: true
  output_schema:
    attribution_values:
      datasets_dtype: float32
      per_latent_model_hook: true
    correct_activations:
      datasets_dtype: float32
      per_latent_model_hook: true
    prompts:
      datasets_dtype: string
      required: false
      non_tensor: true

ablation_attribution:
  description: Compute attribution values from ablation
  implementation: interpretune.analysis.ops.definitions.ablation_attribution_impl
  importable_params:
    logit_diff_fn: interpretune.analysis.ops.definitions.boolean_logits_to_avg_logit_diff
    get_loss_preds_diffs: interpretune.analysis.ops.definitions.get_loss_preds_diffs
  aliases: []
  # TODO: remove appropriate output_schema input_schema columns if/when get_loss_preds_diffs is made an op
  input_schema:
    input:
      datasets_dtype: float32
      connected_obj: datamodule
    answer_indices:
      datasets_dtype: int64
    alive_latents:
      datasets_dtype: int64
      per_latent_model_hook: true
      non_tensor: true
    logit_diffs:
      datasets_dtype: float32
    answer_logits:
      datasets_dtype: float32
      per_latent: true
      sequence_type: false
      array_shape: [batch_size, vocab_size]
    label_ids:
      datasets_dtype: int64
    orig_labels:
      datasets_dtype: int64
  output_schema:
    attribution_values:
      datasets_dtype: float32
      per_latent_model_hook: true
    logit_diffs:
      datasets_dtype: float32
      per_latent: true
    answer_logits:
      datasets_dtype: float32
      per_latent: true
      sequence_type: false
      array_shape: [batch_size, max_answer_tokens, num_classes]
    loss:
      datasets_dtype: float32
      per_latent: true
      sequence_type: false
    preds:
      datasets_dtype: int64
      per_latent: true

extract_concept_latent_state:
  description: Extract per-example latent rows from the configured cache key
  implementation: interpretune.analysis.ops.definitions.extract_concept_latent_state_impl
  aliases: [concept_latent_state_from_cache]
  input_schema:
    cache:
      datasets_dtype: object
      non_tensor: true
      intermediate_only: true
    answer_indices:
      datasets_dtype: int64
    context_token_indices:
      datasets_dtype: int64
      required: false
      array_shape: [null]
      sequence_type: false
    concept_cache_key:
      datasets_dtype: string
      required: false
      non_tensor: true
      default: unembed.hook_in
  output_schema:
    concept_latent_state:
      datasets_dtype: float32
      array_shape: [null, null]
      sequence_type: false
    concept_cache_key:
      datasets_dtype: string
      required: false
      non_tensor: true
      sequence_type: false
    context_token_indices:
      datasets_dtype: int64
      required: false
      array_shape: [null]
      sequence_type: false

extract_concept_latent_examples:
  description: Filter and annotate latent rows for concept-direction aggregation
  implementation: interpretune.analysis.ops.definitions.extract_concept_latent_examples_impl
  aliases: [concept_latent_examples]
  input_schema:
    concept_latent_state:
      datasets_dtype: float32
      required: false
      array_shape: [null, null]
      sequence_type: false
    cache:
      datasets_dtype: object
      required: false
      non_tensor: true
      intermediate_only: true
    answer_indices:
      datasets_dtype: int64
      required: false
    context_token_indices:
      datasets_dtype: int64
      required: false
      array_shape: [null]
      sequence_type: false
    orig_labels:
      datasets_dtype: int64
    logit_diffs:
      datasets_dtype: float32
    concept_group_a_label_ids:
      datasets_dtype: int64
      non_tensor: true
      sequence_type: true
    concept_group_b_label_ids:
      datasets_dtype: int64
      required: false
      non_tensor: true
      sequence_type: true
    concept_group_a_name:
      datasets_dtype: string
      required: false
      non_tensor: true
    concept_group_b_name:
      datasets_dtype: string
      required: false
      non_tensor: true
    concept_cache_key:
      datasets_dtype: string
      required: false
      non_tensor: true
      default: unembed.hook_in
    concept_correct_only:
      datasets_dtype: int64
      required: false
      non_tensor: true
      default: 1
    concept_weight_by_logit_diff:
      datasets_dtype: int64
      required: false
      non_tensor: true
      default: 0
  output_schema:
    concept_latent_state:
      datasets_dtype: float32
      array_shape: [null, null]
      sequence_type: false
    concept_group_id:
      datasets_dtype: int64
      array_shape: [null]
      sequence_type: false
    concept_group_name:
      datasets_dtype: string
      non_tensor: true
      sequence_type: true
    concept_example_logit_diff:
      datasets_dtype: float32
      array_shape: [null]
      sequence_type: false
    concept_example_weight:
      datasets_dtype: float32
      array_shape: [null]
      sequence_type: false
    concept_context_indices:
      datasets_dtype: int64
      required: false
      array_shape: [null]
      sequence_type: false
    concept_cache_key:
      datasets_dtype: string
      required: false
      non_tensor: true
      sequence_type: false
    concept_group_a_name:
      datasets_dtype: string
      required: false
      non_tensor: true
      sequence_type: false
    concept_group_b_name:
      datasets_dtype: string
      required: false
      non_tensor: true
      sequence_type: false

concept_direction:
  description: Aggregate latent concept examples into a normalized concept direction vector
  implementation: interpretune.analysis.ops.definitions.concept_direction_impl
  required_capabilities: [attribution_graph]
  aliases: [semantic_direction]
  input_schema:
    concept_latent_state:
      datasets_dtype: float32
      required: false
      sequence_type: true
    concept_group_id:
      datasets_dtype: int64
      required: false
    concept_group_name:
      datasets_dtype: string
      required: false
      non_tensor: true
    concept_example_weight:
      datasets_dtype: float32
      required: false
    concept_group_a_name:
      datasets_dtype: string
      required: false
      non_tensor: true
    concept_group_b_name:
      datasets_dtype: string
      required: false
      non_tensor: true
    concept_label:
      datasets_dtype: string
      required: false
      non_tensor: true
    concept_group_a:
      required: false
      datasets_dtype: string
      non_tensor: true
    concept_group_b:
      required: false
      datasets_dtype: string
      non_tensor: true
    concept_direction_mode:
      datasets_dtype: string
      required: false
      non_tensor: true
      default: mean_difference
  output_schema:
    concept_direction:
      datasets_dtype: float32
      dyn_dim: 0
      dyn_dim_ceil: vocab_size
      sequence_type: true
    concept_label:
      datasets_dtype: string
      required: false
      non_tensor: true
    concept_group_a_token_ids:
      datasets_dtype: int64
      required: false
      non_tensor: true
      sequence_type: true
    concept_group_b_token_ids:
      datasets_dtype: int64
      required: false
      non_tensor: true
      sequence_type: true
    concept_group_a_name:
      datasets_dtype: string
      required: false
      non_tensor: true
      sequence_type: false
    concept_group_b_name:
      datasets_dtype: string
      required: false
      non_tensor: true
      sequence_type: false
    concept_direction_mode:
      datasets_dtype: string
      required: false
      non_tensor: true
      sequence_type: false

