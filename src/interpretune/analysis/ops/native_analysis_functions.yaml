  required_capabilities: [attribution_graph]
  aliases: [ct_graph]
  input_schema:
    concept_direction:
      datasets_dtype: float32
      required: false
      sequence_type: true
  output_schema:
    input_string:
      datasets_dtype: string
      non_tensor: true
      sequence_type: false
    adjacency_matrix:
      datasets_dtype: float32
      array_shape: [null, null]
      sequence_type: false
    active_features:
      datasets_dtype: int64
      array_shape: [null, 3]
      sequence_type: false
    selected_features:
      datasets_dtype: int64
