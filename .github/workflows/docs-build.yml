name: Docs build

# REQUIRED smoke (not optional): docs are under active build-out and errors must surface on every
# change. Mirrors the Read the Docs build (mocked heavy deps).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/docs.txt
      - name: Install docs requirements
        run: |
          pip install -r requirements/docs.txt
          PIP_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cpu pip install .
      - name: Build docs (errors fail; warnings reported)
        env:
          SPHINX_MOCK_REQUIREMENTS: "1"
        run: |
          python -m sphinx -b html --keep-going docs/source docs/build
      - name: Upload built docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/build
          retention-days: 7
