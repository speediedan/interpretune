name: Test full

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'INFO'
        type: choice
        options:
        - 'INFO'
        - 'DEBUG'
      run_resource_monitor:
        description: 'Run CI resource monitor'
        required: false
        default: '0'
        type: string
  push:
    branches: [main, "release/*", "bugfix/*"]
    paths:
      - "setup.*"
      - "requirements.txt"
      - "pyproject.toml"
      - ".codecov.yml"
      - "tests/**"
      - "src/**"
      - "requirements/**"
      - ".github/workflows/ci_test-full.yml"
      - ".actions/**"
      # Exclude documentation-only files from triggering
      - "!docs/**"
      - "!**/*.md"
      - "!**/*.rst"
      - "!mkdocs.yml"
      - "!**/CHANGELOG.md"
      - "!**/CODE_OF_CONDUCT.md"
      - "!**/CONTRIBUTING.md"
      - "!**/LICENSE*"
  pull_request:
    branches: [main, "release/*", "bugfix/*"]
    types: [opened, reopened, ready_for_review, synchronize]
    paths:
      - "setup.*"
      - "requirements.txt"
      - "pyproject.toml"
      - ".codecov.yml"
      - "tests/**"
      - "src/**"
      - "requirements/**"
      - ".github/workflows/ci_test-full.yml"
      - ".actions/**"
      # Exclude documentation-only files from triggering
      - "!docs/**"
      - "!**/*.md"
      - "!**/*.rst"
      - "!mkdocs.yml"
      - "!**/CHANGELOG.md"
      - "!**/CODE_OF_CONDUCT.md"
      - "!**/CONTRIBUTING.md"
      - "!**/LICENSE*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ ! (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) }}

jobs:
  # this job allows us to set the log level and resource monitor with the following precedence:
  # workflow_dispatch inputs -> repository variable defaults -> fallback defaults
  log-dispatch-inputs:
    runs-on: ubuntu-latest
    outputs:
      log_level: ${{ steps.resolve_dispatch_vars.outputs.log_level }}
      run_resource_monitor: ${{ steps.resolve_dispatch_vars.outputs.run_resource_monitor }}
    steps:
      - name: Resolve workflow dispatch inputs
        id: resolve_dispatch_vars
        run: |
          echo "log_level=${{ inputs.logLevel || vars.IT_CI_LOG_LEVEL || 'INFO'  }}" >> $GITHUB_OUTPUT
          echo "run_resource_monitor=${{ inputs.run_resource_monitor || vars.CI_RESOURCE_MONITOR || '0' }}" >> $GITHUB_OUTPUT
  cpu:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [
          # ubuntu-22.04,
          windows-2022,
          # macos-14
          ]
        python-version: ["3.12"]
    timeout-minutes: 90
    env:
      # uncomment to enable more granular logging for this workflow
      IT_CI_LOG_LEVEL: "DEBUG"
      # CI_RESOURCE_MONITOR: "1"
      IT_USE_CT_COMMIT_PIN: "1"
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      HF_GATED_PUBLIC_REPO_AUTH_KEY: ${{ secrets.HF_GATED_PUBLIC_REPO_AUTH_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Reset caching
        id: set_time_period
        run: |
          python -c "import time; days = time.time() / 60 / 60 / 24; print(f'TIME_PERIOD=d{int(days / 2) * 2}')" >> $GITHUB_OUTPUT

      - name: Install libpq (macOS only)
        if: runner.os == 'macOS'
        run: |
          brew install libpq
          brew link --force libpq
      - name: Set up venv and install dependencies (all OS)
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m pip install '.[test,examples,lightning]' -c requirements/ci_constraints.txt
          pip install --upgrade datasets
          pip install --upgrade fsspec
          pip list

      # Note: This uses an internal pip API and may not always work
      # https://github.com/actions/cache/blob/master/examples.md#multiple-oss-in-a-workflow
      # sadly, this env var is not properly abstracted over OS platforms so we set it twice, the second time for windows
      - name: Get pip cache dir windows
        id: pip-cache
        run: |
          echo "PIP_CACHE_DIR=$(pip cache dir)" >> $GITHUB_OUTPUT
          echo "PIP_CACHE_DIR=$(pip cache dir)" >> $env:GITHUB_OUTPUT

      - name: pip cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-td${{ steps.set_time_period.outputs.TIME_PERIOD }}-py${{ matrix.python-version }}-${{ hashFiles('requirements/base.txt') }}-${{ hashFiles('requirements/test.txt') }}-${{ hashFiles('requirements/examples.txt') }}-${{ hashFiles('requirements/lightning.txt') }}-${{ hashFiles('requirements/circuit_tracer_pin.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-td${{ steps.set_time_period.outputs.TIME_PERIOD }}-py${{ matrix.python-version }}-

      - name: Install wtrace (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wtrace -y
          Write-Host "wtrace installed via Chocolatey"


      - name: Start wtrace session (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $outputEtl = "$env:TEMP\filesystem_errors.etl"
          $outputTxt = "$env:TEMP\filesystem_errors.txt"
          # Start wtrace with handlers and filters for file I/O errors (FileIO/Write and FileIO/Create)
          Start-Process -FilePath "wtrace" -ArgumentList @(
            'start',
            '--handlers', 'file',
            '-f', 'name >= FileIO/Write',
            '-f', 'name >= FileIO/Create',
            '-o', $outputEtl
          ) -WindowStyle Hidden
          Start-Sleep -Seconds 5

      - name: Run tests, coverage, and resource monitor
        shell: bash
        env:
          # uncomment these at the step level here to force more granular logging for this workflow without manual
          # dispatch or repository override
          IT_CI_LOG_LEVEL: "DEBUG"
          # CI_RESOURCE_MONITOR: "1"
          PYTHONPATH: ${{ github.workspace }}/src
          # Make log level configurable via IT_CI_LOG_LEVEL (repo default: 'INFO')
          PYTEST_ADDOPTS: "--log-cli-level=${{ env.IT_CI_LOG_LEVEL }} --log-cli-format='%(asctime)s [%(levelname)8s] %(name)s: %(message)s' --capture=no"
          # Optional: filter pattern for pytest (-k), disables coverage if set
          # PYTEST_FILTER_PATTERN: ${{ env.PYTEST_FILTER_PATTERN || '' }}
          PYTEST_FILTER_PATTERN: ${{ env.PYTEST_FILTER_PATTERN || 'test_tl_direct_attr or test_format_columns_all_indices' }}
        run: |
          if [ -n "$PYTEST_FILTER_PATTERN" ]; then
            echo "PYTEST_FILTER_PATTERN is set to '$PYTEST_FILTER_PATTERN'. Disabling coverage collection and running filtered tests only."
            PYTEST_CMD="pytest src/interpretune tests -v --import-mode=importlib --durations=50 -k \"$PYTEST_FILTER_PATTERN\" --junitxml=junit/test-results-${{ runner.os }}-py${{ matrix.python-version }}.xml"
          else
            PYTEST_CMD="coverage run --append --source src/interpretune -m pytest src/interpretune tests -v --import-mode=importlib --durations=50 --junitxml=junit/test-results-${{ runner.os }}-py${{ matrix.python-version }}.xml"
          fi
          if [ "${{ runner.os }}" = "Linux" ]; then
            chmod +x ./scripts/ci_resource_monitor.sh
            ./scripts/ci_resource_monitor.sh &
            monitor_pid=$!
            eval $PYTEST_CMD
            kill $monitor_pid || true
          else
            eval $PYTEST_CMD
          fi

      - name: Stop wtrace session and convert trace (Windows only)
        if: runner.os == 'Windows'
        id: wtrace_convert
        shell: pwsh
        run: |
          $outputEtl = "$env:TEMP\filesystem_errors.etl"
          $outputTxt = "$env:TEMP\filesystem_errors.txt"
          # Stop the wtrace session
          wtrace stop
          # Convert the ETL file to text
          wtrace convert -i $outputEtl -f text -o $outputTxt
          Write-Host "wtrace trace converted to $outputTxt"
          echo "wtrace_txt_path=$outputTxt" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload wtrace output (Windows only)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: wtrace-filesystem-errors-${{ runner.os }}-${{ matrix.python-version }}
          path: ${{ env.wtrace_txt_path }}
      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ runner.os }}-${{ matrix.python-version }}
          path: junit/test-results-${{ runner.os }}-py${{ matrix.python-version }}.xml
        if: failure()
      - name: Statistics
        if: success()
        run: |
          coverage report
          coverage xml
