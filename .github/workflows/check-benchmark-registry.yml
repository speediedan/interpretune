name: Check benchmark registry isolation

on:
  pull_request:
    branches: [main, "release/*"]
    paths:
      - "tests/benchmarks/benchmark_registry.yaml"

jobs:
  check-registry-isolation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check registry commits are isolated
        run: |
          # For each commit in the PR that touches the registry, verify
          # the only other file allowed is benchmark_update.allow.
          ALLOWED="tests/benchmarks/benchmark_registry.yaml tests/benchmarks/benchmark_update.allow"
          # Historical commits that predate the isolation policy (grandfathered; do not extend
          # this list for new work — see tests/benchmarks/README.md):
          GRANDFATHERED="9923f7d149c888d5ff98842e41a1964e8602bba2 b6fecf4d3687da1e120317c4ffaa13eacba4c49a"
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          FAILED=0
          for SHA in $(git log --format=%H "${BASE}..${HEAD}" -- tests/benchmarks/benchmark_registry.yaml); do
            if echo "$GRANDFATHERED" | grep -qw "$SHA"; then
              echo "Skipping grandfathered pre-policy commit $SHA"
              continue
            fi
            FILES=$(git diff-tree --no-commit-id --name-only -r "$SHA")
            for F in $FILES; do
              if ! echo "$ALLOWED" | grep -qw "$F"; then
                echo "ERROR: Commit $SHA modifies benchmark_registry.yaml alongside unrelated file: $F"
                FAILED=1
              fi
            done
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Registry updates must be committed in isolation."
            echo "See tests/benchmarks/README.md for details."
            exit 1
          fi
          echo "All registry commits are properly isolated."
